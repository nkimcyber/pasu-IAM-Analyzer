name: IAM Policy Security Scan

on:
  push:
    paths:
      - '**/*policy*.json'
      - '**/*iam*.json'
  pull_request:
    paths:
      - '**/*policy*.json'
      - '**/*iam*.json'

jobs:
  iam-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pasu
        run: pip install pasu

      - name: Scan IAM policies
        run: |
          for f in $(find . -name '*policy*.json' -o -name '*iam*.json'); do
            echo "Scanning $f..."
            pasu scan --file "$f" --format text
          done

      - name: Generate SARIF report
        if: always()
        run: |
          for f in $(find . -name '*policy*.json' -o -name '*iam*.json'); do
            pasu scan --file "$f" --format sarif > "${f%.json}.sarif"
          done

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .
