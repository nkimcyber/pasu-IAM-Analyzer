<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IAM Policy Explainer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px;
      color: #1a202c;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #2d3748;
    }

    header p {
      margin-top: 8px;
      font-size: 1rem;
      color: #718096;
    }

    .card {
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      padding: 32px;
      width: 100%;
      max-width: 780px;
    }

    label {
      display: block;
      font-weight: 600;
      font-size: 0.9rem;
      color: #4a5568;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    textarea {
      width: 100%;
      height: 220px;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 0.85rem;
      line-height: 1.6;
      padding: 14px 16px;
      border: 1.5px solid #cbd5e0;
      border-radius: 8px;
      resize: vertical;
      background: #f7fafc;
      color: #2d3748;
      transition: border-color 0.2s;
      outline: none;
    }

    textarea:focus { border-color: #4299e1; background: #fff; }

    textarea.error { border-color: #fc8181; }

    .error-msg {
      margin-top: 6px;
      font-size: 0.82rem;
      color: #e53e3e;
      display: none;
    }

    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    button {
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      padding: 12px 28px;
      transition: background 0.2s, transform 0.1s;
    }

    button:active { transform: scale(0.98); }

    #explainBtn {
      background: #4299e1;
      color: #fff;
      flex: 1;
    }

    #explainBtn:hover { background: #3182ce; }

    #explainBtn:disabled { background: #a0aec0; cursor: not-allowed; }

    #clearBtn {
      background: #edf2f7;
      color: #4a5568;
    }

    #clearBtn:hover { background: #e2e8f0; }

    /* Result area */
    #result {
      margin-top: 32px;
      display: none;
    }

    .result-section {
      margin-bottom: 24px;
    }

    .result-section h2 {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #718096;
      margin-bottom: 10px;
    }

    .summary-box {
      background: #ebf8ff;
      border-left: 4px solid #4299e1;
      border-radius: 6px;
      padding: 14px 18px;
      font-size: 1rem;
      color: #2c5282;
      line-height: 1.6;
      font-weight: 500;
    }

    .details-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .details-list li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: #f7fafc;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.95rem;
      color: #2d3748;
      line-height: 1.6;
    }

    .details-list li::before {
      content: "✦";
      color: #4299e1;
      font-size: 0.75rem;
      margin-top: 4px;
      flex-shrink: 0;
    }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 3px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error banner */
    #errorBanner {
      display: none;
      margin-top: 20px;
      background: #fff5f5;
      border: 1px solid #fed7d7;
      border-radius: 8px;
      padding: 14px 18px;
      color: #c53030;
      font-size: 0.9rem;
    }

    footer {
      margin-top: 40px;
      font-size: 0.8rem;
      color: #a0aec0;
    }
  </style>
</head>
<body>

  <header>
    <h1>🔐 IAM Policy Explainer</h1>
    <p>Paste any AWS IAM policy JSON and get a plain English explanation instantly.</p>
  </header>

  <div class="card">
    <label for="policyInput">Paste your IAM policy JSON</label>
    <textarea
      id="policyInput"
      spellcheck="false"
      placeholder='{
  "Version": "2012-10-17",
  "Statement": [
    {
      "Effect": "Allow",
      "Action": "s3:GetObject",
      "Resource": "arn:aws:s3:::my-bucket/*"
    }
  ]
}'></textarea>
    <div class="error-msg" id="jsonError">⚠ Please enter valid JSON before submitting.</div>

    <div class="btn-row">
      <button id="explainBtn" onclick="explain()">Explain this policy</button>
      <button id="clearBtn" onclick="clearAll()">Clear</button>
    </div>

    <div id="errorBanner"></div>

    <div id="result">
      <div class="result-section">
        <h2>Summary</h2>
        <div class="summary-box" id="summaryText"></div>
      </div>
      <div class="result-section">
        <h2>What this policy does</h2>
        <ul class="details-list" id="detailsList"></ul>
      </div>
    </div>
  </div>

  <footer>Powered by Claude AI · IAM Analyzer MVP</footer>

  <script>
    function isValidJson(str) {
      try { JSON.parse(str); return true; }
      catch { return false; }
    }

    function setLoading(on) {
      const btn = document.getElementById("explainBtn");
      if (on) {
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>Analyzing…';
      } else {
        btn.disabled = false;
        btn.innerHTML = "Explain this policy";
      }
    }

    function showError(msg) {
      const banner = document.getElementById("errorBanner");
      banner.style.display = "block";
      banner.textContent = "⚠ " + msg;
    }

    function hideError() {
      document.getElementById("errorBanner").style.display = "none";
    }

    async function explain() {
      const input = document.getElementById("policyInput");
      const jsonError = document.getElementById("jsonError");
      const result = document.getElementById("result");

      hideError();
      result.style.display = "none";

      const raw = input.value.trim();
      if (!raw || !isValidJson(raw)) {
        input.classList.add("error");
        jsonError.style.display = "block";
        return;
      }

      input.classList.remove("error");
      jsonError.style.display = "none";
      setLoading(true);

      try {
        const resp = await fetch("/api/v1/explain", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ policy_json: raw }),
        });

        if (!resp.ok) {
          const err = await resp.json();
          const msg = resp.status === 400
            ? "⚠ This doesn't look like a valid IAM policy. Please paste a JSON policy with a Statement array."
            : (err.detail || "Something went wrong. Please try again.");
          showError(msg);
          return;
        }

        const data = await resp.json();

        document.getElementById("summaryText").textContent = data.summary;

        const list = document.getElementById("detailsList");
        list.innerHTML = "";
        data.details.forEach(item => {
          const li = document.createElement("li");
          li.textContent = item;
          list.appendChild(li);
        });

        result.style.display = "block";
        result.scrollIntoView({ behavior: "smooth", block: "start" });

      } catch (e) {
        showError("Network error. Is the server running?");
      } finally {
        setLoading(false);
      }
    }

    function clearAll() {
      document.getElementById("policyInput").value = "";
      document.getElementById("policyInput").classList.remove("error");
      document.getElementById("jsonError").style.display = "none";
      document.getElementById("result").style.display = "none";
      hideError();
    }

    // Allow Ctrl+Enter to submit
    document.getElementById("policyInput").addEventListener("keydown", e => {
      if (e.ctrlKey && e.key === "Enter") explain();
    });
  </script>

</body>
</html>
